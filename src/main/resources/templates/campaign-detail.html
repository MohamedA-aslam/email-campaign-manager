<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BECMS — Campaign Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy:#0D1117; --surface:#161B22; --surface2:#1C2128; --border:#21262D;
            --indigo:#6366F1; --indigo2:#818CF8; --coral:#F472B6; --gold:#FBBF24;
            --green:#34D399; --red:#F87171; --text1:#F0F6FC; --text2:#8B949E; --text3:#484F58;
        }
        body { font-family:'Inter',sans-serif; background:var(--navy); color:var(--text1); min-height:100vh; }
        nav { display:flex; align-items:center; gap:8px; padding:0 32px; height:60px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
        .nav-brand { font-weight:800; font-size:1.1rem; background:linear-gradient(135deg,var(--indigo2),var(--coral)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:16px; letter-spacing:-0.5px; }
        nav a { text-decoration:none; color:var(--text2); font-size:0.875rem; font-weight:500; padding:6px 12px; border-radius:6px; transition:all 0.15s; }
        nav a:hover { color:var(--text1); background:var(--border); }
        nav a.nav-cta { background:var(--indigo); color:white; margin-left:auto; }
        main { padding:40px 32px; max-width:1280px; margin:0 auto; }
        .alert { padding:12px 16px; border-radius:8px; margin-bottom:20px; font-size:0.875rem; font-weight:500; }
        .alert-success { background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.3); color:var(--green); }
        .top-row { display:flex; gap:24px; margin-bottom:32px; align-items:flex-start; }
        .info-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; flex:1; }
        .campaign-name { font-size:1.5rem; font-weight:800; letter-spacing:-0.3px; margin-bottom:6px; }
        .campaign-subject { color:var(--text2); font-size:0.9rem; margin-bottom:20px; }
        .meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
        .meta-item label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text3); display:block; margin-bottom:4px; }
        .meta-item span { font-size:0.9rem; color:var(--text1); }
        .stats-col { display:flex; flex-direction:column; gap:12px; min-width:180px; }
        .mini-stat { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
        .mini-stat .val { font-size:2rem; font-weight:800; letter-spacing:-0.5px; }
        .mini-stat .lbl { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text2); margin-top:4px; }
        .val-total { color:var(--indigo2); }
        .val-sent  { color:var(--green); }
        .val-fail  { color:var(--coral); }
        .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }
        .badge::before { content:''; width:6px; height:6px; border-radius:50%; }
        .badge-draft     { background:rgba(139,148,158,0.15); color:var(--text2); }
        .badge-draft::before { background:var(--text2); }
        .badge-scheduled { background:rgba(251,191,36,0.15); color:var(--gold); }
        .badge-scheduled::before { background:var(--gold); }
        .badge-progress  { background:rgba(99,102,241,0.15); color:var(--indigo2); }
        .badge-progress::before { background:var(--indigo2); }
        .badge-completed { background:rgba(52,211,153,0.15); color:var(--green); }
        .badge-completed::before { background:var(--green); }
        .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:8px; font-size:0.875rem; font-weight:600; text-decoration:none; border:none; cursor:pointer; transition:all 0.15s; font-family:'Inter',sans-serif; }
        .btn-send { background:linear-gradient(135deg, var(--green), #059669); color:#0D1117; font-weight:700; margin-top:16px; }
        .btn-send:hover { opacity:0.9; transform:translateY(-1px); }
        .btn-back { background:transparent; border:1px solid var(--border); color:var(--text2); margin-bottom:20px; }
        .btn-back:hover { border-color:var(--text2); color:var(--text1); }
        .section-title { font-size:1.125rem; font-weight:700; margin-bottom:16px; }
        .table-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
        th { padding:12px 16px; text-align:left; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text2); }
        td { padding:13px 16px; font-size:0.875rem; border-bottom:1px solid var(--border); }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr:hover { background:var(--surface2); }
        .status-sent { color:var(--green); font-weight:600; }
        .status-fail { color:var(--coral); font-weight:600; }
        .empty-row td { text-align:center; color:var(--text2); padding:40px; }
        .failure-reason { color:var(--coral); font-size:0.8rem; }
    </style>
</head>
<body>
<nav>
    <span class="nav-brand">✦ BECMS</span>
    <a href="/dashboard">Dashboard</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/recipients">Recipients</a>
    <a href="/profile">SMTP Profile</a>
    <a href="/campaigns/new" class="nav-cta">+ New Campaign</a>
</nav>
<main>
    <a href="/campaigns" class="btn btn-back">← Back to Campaigns</a>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="top-row">
        <div class="info-card">
            <div class="campaign-name" th:text="${campaign.name}"></div>
            <div class="campaign-subject" th:text="'Subject: ' + ${campaign.subject}"></div>

            <div class="meta-grid">
                <div class="meta-item">
                    <label>Status</label>
                    <span th:switch="${campaign.status.toString()}">
                        <span th:case="'DRAFT'"       class="badge badge-draft">Draft</span>
                        <span th:case="'SCHEDULED'"   class="badge badge-scheduled">Scheduled</span>
                        <span th:case="'IN_PROGRESS'" class="badge badge-progress">In Progress</span>
                        <span th:case="'COMPLETED'"   class="badge badge-completed">Completed</span>
                    </span>
                </div>
                <div class="meta-item">
                    <label>Scheduled</label>
                    <span th:text="${campaign.scheduledTime != null ? #temporals.format(campaign.scheduledTime,'dd MMM yyyy, HH:mm') : 'Not scheduled'}"></span>
                </div>
            </div>

            <form th:action="@{/campaigns/{id}/send(id=${campaign.id})}" method="post">
                <button class="btn btn-send" type="submit" onclick="return confirm('Send this campaign now to all subscribed recipients?')">
                    ▶ Send Now
                </button>
            </form>
        </div>

        <div class="stats-col">
            <div class="mini-stat">
                <div class="val val-total" th:text="${campaign.totalRecipients}">0</div>
                <div class="lbl">Total</div>
            </div>
            <div class="mini-stat">
                <div class="val val-sent" th:text="${campaign.sentCount}">0</div>
                <div class="lbl">Sent</div>
            </div>
            <div class="mini-stat">
                <div class="val val-fail" th:text="${campaign.failedCount}">0</div>
                <div class="lbl">Failed</div>
            </div>
        </div>
    </div>

    <!-- Delivery Logs -->
    <div class="section-title">Delivery Logs</div>
    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>Recipient</th>
                <th>Email</th>
                <th>Status</th>
                <th>Sent At</th>
                <th>Failure Reason</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${logs}">
                <td style="font-weight:500;" th:text="${log.recipientName}"></td>
                <td style="color:var(--text2);" th:text="${log.recipientEmail}"></td>
                <td>
                    <span th:if="${log.status.toString() == 'SENT'}"  class="status-sent">✓ Sent</span>
                    <span th:if="${log.status.toString() == 'FAILED'}" class="status-fail">✗ Failed</span>
                </td>
                <td style="color:var(--text2);" th:text="${#temporals.format(log.sentAt,'dd MMM, HH:mm:ss')}"></td>
                <td class="failure-reason" th:text="${log.failureReason ?: '—'}"></td>
            </tr>
            <tr class="empty-row" th:if="${#lists.isEmpty(logs)}">
                <td colspan="5">No delivery logs yet. Send the campaign to see results here.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
