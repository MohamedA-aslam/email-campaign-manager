<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit SMTP Profile</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        nav a { margin-right: 15px; text-decoration: none; color: #0070f3; font-weight: bold; }
        .form-card { background: white; padding: 30px; border-radius: 8px; max-width: 480px;
                     margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 16px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 9px 10px; margin-top: 5px; border: 1px solid #ddd;
                border-radius: 5px; box-sizing: border-box; font-size: 0.95em; }
        input:focus { outline: none; border-color: #0070f3; box-shadow: 0 0 0 2px rgba(0,112,243,0.15); }
        .field-error { color: #dc3545; font-size: 0.82em; margin-top: 4px; display: block; }
        .btn-row { display: flex; gap: 10px; margin-top: 24px; }
        .btn { padding: 9px 22px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.95em; font-weight: bold; }
        .btn-primary { background: #0070f3; color: white; }
        .btn-primary:hover { background: #005ed4; }
        .btn-secondary { background: #e9ecef; color: #495057; text-decoration: none;
                         display: inline-flex; align-items: center; }
        .hint { font-size: 0.78em; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
<nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/campaigns/new">New Campaign</a>
    <a href="/recipients">Recipients</a>
    <a href="/profile">⚙️ SMTP Profile</a>
    <a href="/query-builder">Query Builder</a>
</nav>
<marquee style="background:#1a1a1a; color:#fbbf24; padding:8px; font-size:0.85rem;">
    ⚠️ Demo Mode — Email delivery is disabled on this hosted version. Render's free tier blocks outbound SMTP connections. All other features work normally. Run locally to enable email sending.
</marquee>

<h1>✏️ Edit SMTP Profile</h1>

<div class="form-card">
    <form th:action="@{/profile/{id}/edit(id=${profile.id})}"
          th:object="${profile}" method="post">

        <label>Display Name
            <input type="text" th:field="*{displayName}" placeholder="e.g. Marketing Account"/>
            <span class="field-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></span>
        </label>

        <label>Email Provider
            <select th:field="*{provider}"
                    onchange="toggleProviderFields(this.value)">
                <option value="SMTP">📧 SMTP / SendGrid</option>
                <option value="AMAZON_SES">☁️ Amazon SES</option>
            </select>
        </label>

        <div id="smtpFields"
             th:style="${profile.provider.toString() == 'AMAZON_SES'} ? 'display:none' : ''">
            <label>App Password
                <input type="password" th:field="*{appPassword}"
                       placeholder="Leave blank to keep existing"/>
            </label>
            <label>SMTP Host
                <input type="text" th:field="*{smtpHost}"/>
            </label>
            <label>SMTP Port
                <input type="number" th:field="*{smtpPort}"/>
            </label>
        </div>

        <div id="sesFields"
             th:style="${profile.provider.toString() == 'AMAZON_SES'} ? '' : 'display:none'">
            <label>AWS Access Key
                <input type="text" th:field="*{awsAccessKey}"
                       placeholder="AKIAIOSFODNN7EXAMPLE" autocomplete="off"/>
            </label>
            <label>AWS Secret Key
                <input type="password" th:field="*{awsSecretKey}"
                       placeholder="Leave blank to keep existing" autocomplete="off"/>
            </label>
            <label>AWS Region
                <select th:field="*{awsRegion}">
                    <option value="us-east-1">US East — us-east-1</option>
                    <option value="us-west-2">US West — us-west-2</option>
                    <option value="eu-west-1">Europe Ireland — eu-west-1</option>
                    <option value="eu-central-1">Europe Frankfurt — eu-central-1</option>
                    <option value="eu-north-1">Europe Stockolm — eu-north-1</option>
                    <option value="ap-south-1">Asia Pacific Mumbai — ap-south-1</option>
                    <option value="ap-southeast-1">Asia Pacific Singapore — ap-southeast-1</option>
                    <option value="ap-northeast-1">Asia Pacific Tokyo — ap-northeast-1</option>

                </select>
            </label>
        </div>

        <script>
            function toggleProviderFields(provider) {
                const smtp = document.getElementById('smtpFields');
                const ses  = document.getElementById('sesFields');
                if (provider === 'AMAZON_SES') {
                    smtp.style.display = 'none';
                    ses.style.display  = 'block';
                } else {
                    smtp.style.display = 'block';
                    ses.style.display  = 'none';
                }
            }
        </script>
        <div class="btn-row">
            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
            <a href="/profile" class="btn btn-secondary">✕ Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
